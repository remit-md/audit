name: Halmos

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Protocol repo ref (branch, tag, or SHA)"
        required: false
        default: "main"
        type: string
      timeout:
        description: "Solver timeout per test (seconds)"
        required: false
        default: "300"
        type: string
      contract:
        description: "Halmos test contract to run (default: all check_ tests)"
        required: false
        default: "RemitSymbolicProofs"
        type: string
  workflow_call:
    inputs:
      ref:
        required: false
        default: "main"
        type: string

jobs:
  halmos:
    name: Halmos symbolic proofs
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 90

    steps:
      - name: Checkout protocol
        uses: actions/checkout@v4
        with:
          repository: remit-md/protocol
          ref: ${{ inputs.ref }}
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build contracts
        run: forge build --skip script

      - name: Install Halmos
        run: pip install halmos

      - name: Run Halmos symbolic proofs
        run: |
          halmos \
            --match-contract ${{ inputs.contract }} \
            --solver-timeout-assertion ${{ inputs.timeout }} \
            --solver-timeout-branching ${{ inputs.timeout }} \
            --storage-layout generic \
            --statistics \
            2>&1 | tee halmos-output.txt || true

      - name: Generate summary
        if: always()
        run: |
          echo "## Halmos Symbolic Proof Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Parse results
          pass=$(grep -c "^.*PASS" halmos-output.txt 2>/dev/null || echo "0")
          fail=$(grep -c "^.*FAIL" halmos-output.txt 2>/dev/null || echo "0")
          echo "**Passed:** ${pass} | **Failed:** ${fail}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Proof Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "^.*(PASS|FAIL|check_|Counterexample)" halmos-output.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "See artifact for full output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Properties" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| ID | Property | Contract |" >> $GITHUB_STEP_SUMMARY
          echo "|----|----------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| P1 | Fee correctness: fee <= 1% of amount, no dust | FeeCalculator |" >> $GITHUB_STEP_SUMMARY
          echo "| P2 | Fund conservation: payee + fee = escrowed amount | Escrow |" >> $GITHUB_STEP_SUMMARY
          echo "| P3 | No double-settle: second releaseEscrow always reverts | Escrow |" >> $GITHUB_STEP_SUMMARY
          echo "| P4 | Tab locks exact amount: payer loses exactly limit | Tab |" >> $GITHUB_STEP_SUMMARY
          echo "| P5 | Fee oracle correctness: MockFeeCalculator = 1% formula | FeeCalculator |" >> $GITHUB_STEP_SUMMARY

          if [ -f halmos-output.txt ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Statistics" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -E "^(Time|Paths|Total)" halmos-output.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: halmos-report
          path: halmos-output.txt
          retention-days: 90
