name: Mythril

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Protocol repo ref (branch, tag, or SHA)"
        required: false
        default: "main"
        type: string
      contracts:
        description: "Comma-separated contract names to analyze (empty = all fund-holding)"
        required: false
        default: ""
        type: string

# Fund-holding contracts to analyze by default
# RemitEscrow, RemitTab, RemitStream, RemitBounty, RemitDeposit, RemitOnrampVault, RemitRouter

jobs:
  mythril:
    name: Mythril symbolic analysis
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout protocol
        uses: actions/checkout@v4
        with:
          repository: remit-md/protocol
          ref: ${{ inputs.ref }}
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build contracts
        run: forge build

      - name: Install Mythril
        run: pip install mythril

      - name: Determine contracts to analyze
        id: contracts
        run: |
          if [ -n "${{ inputs.contracts }}" ]; then
            echo "list=${{ inputs.contracts }}" >> $GITHUB_OUTPUT
          else
            echo "list=RemitEscrow,RemitTab,RemitStream,RemitBounty,RemitDeposit,RemitOnrampVault,RemitRouter" >> $GITHUB_OUTPUT
          fi

      - name: Run Mythril
        run: |
          mkdir -p mythril-reports
          IFS=',' read -ra CONTRACTS <<< "${{ steps.contracts.outputs.list }}"
          for contract in "${CONTRACTS[@]}"; do
            contract=$(echo "$contract" | xargs)  # trim whitespace
            echo "=== Analyzing $contract ==="
            sol_file=$(find src -name "${contract}.sol" | head -1)
            if [ -z "$sol_file" ]; then
              echo "WARNING: ${contract}.sol not found, skipping"
              continue
            fi
            myth analyze "$sol_file" \
              --solc-json <(echo '{"optimizer":{"enabled":true,"runs":200},"evmVersion":"cancun"}') \
              --solv 0.8.24 \
              --execution-timeout 300 \
              --max-depth 24 \
              -o markdown \
              > "mythril-reports/${contract}.md" 2>&1 || true
            echo "--- ${contract} done ---"
          done
          # Combined output
          cat mythril-reports/*.md > mythril-combined.md 2>/dev/null || echo "No reports generated" > mythril-combined.md

      - name: Generate summary
        run: |
          echo "## Mythril Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for f in mythril-reports/*.md; do
            [ -f "$f" ] || continue
            name=$(basename "$f" .md)
            issues=$(grep -c "^##" "$f" 2>/dev/null || echo "0")
            echo "- **${name}**: ${issues} finding(s)" >> $GITHUB_STEP_SUMMARY
          done

      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mythril-reports
          path: |
            mythril-reports/
            mythril-combined.md
          retention-days: 90
