name: Mythril

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Protocol repo ref (branch, tag, or SHA)"
        required: false
        default: "main"
        type: string
      contracts:
        description: "Comma-separated contract names to analyze (empty = all)"
        required: false
        default: ""
        type: string
      timeout:
        description: "Execution timeout per contract (seconds)"
        required: false
        default: "300"
        type: string
  workflow_call:
    inputs:
      ref:
        required: false
        default: "main"
        type: string

# All 11 source contracts:
#   Fund-holding:  RemitEscrow, RemitTab, RemitStream, RemitBounty, RemitDeposit, RemitOnrampVault
#   Proxied:       RemitRouter (UUPS), RemitFeeCalculator (UUPS)
#   Infrastructure: RemitKeyRegistry, RemitArbitration, OnrampVaultFactory

jobs:
  mythril:
    name: Mythril symbolic analysis
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout protocol
        uses: actions/checkout@v4
        with:
          repository: remit-md/protocol
          ref: ${{ inputs.ref }}
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build contracts
        run: forge build

      - name: Install Mythril
        run: pip install mythril

      - name: Generate remappings file
        run: forge remappings > remappings.txt

      - name: Determine contracts to analyze
        id: contracts
        run: |
          if [ -n "${{ inputs.contracts }}" ]; then
            echo "list=${{ inputs.contracts }}" >> $GITHUB_OUTPUT
          else
            echo "list=RemitEscrow,RemitTab,RemitStream,RemitBounty,RemitDeposit,RemitOnrampVault,RemitRouter,RemitFeeCalculator,RemitKeyRegistry,RemitArbitration,OnrampVaultFactory" >> $GITHUB_OUTPUT
          fi

      - name: Run Mythril
        run: |
          mkdir -p mythril-reports
          # Build remapping args for solc
          REMAPS=$(cat remappings.txt | tr '\n' ' ' | sed 's/ *$//')

          IFS=',' read -ra CONTRACTS <<< "${{ steps.contracts.outputs.list }}"
          for contract in "${CONTRACTS[@]}"; do
            contract=$(echo "$contract" | xargs)
            echo "=== Analyzing $contract ==="
            sol_file=$(find src -name "${contract}.sol" | head -1)
            if [ -z "$sol_file" ]; then
              echo "WARNING: ${contract}.sol not found, skipping"
              continue
            fi
            myth analyze "$sol_file" \
              --solc-json <(echo "{\"optimizer\":{\"enabled\":true,\"runs\":200},\"evmVersion\":\"cancun\",\"remappings\":[$(forge remappings | sed 's/.*/"&"/' | paste -sd,)]}") \
              --solv 0.8.24 \
              --execution-timeout ${{ inputs.timeout || '300' }} \
              --max-depth 24 \
              -o markdown \
              > "mythril-reports/${contract}.md" 2>&1 || true
            echo "--- ${contract} done ---"
          done
          cat mythril-reports/*.md > mythril-combined.md 2>/dev/null || echo "No reports generated" > mythril-combined.md

      - name: Generate summary
        if: always()
        run: |
          echo "## Mythril Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Contract | Findings | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|----------|--------|" >> $GITHUB_STEP_SUMMARY
          IFS=',' read -ra CONTRACTS <<< "${{ steps.contracts.outputs.list }}"
          for contract in "${CONTRACTS[@]}"; do
            contract=$(echo "$contract" | xargs)
            f="mythril-reports/${contract}.md"
            if [ -f "$f" ]; then
              issues=$(grep -c "^##" "$f" 2>/dev/null || echo "0")
              if grep -qi "error\|exception\|traceback" "$f" 2>/dev/null; then
                echo "| ${contract} | — | Error (see artifact) |" >> $GITHUB_STEP_SUMMARY
              else
                echo "| ${contract} | ${issues} | Analyzed |" >> $GITHUB_STEP_SUMMARY
              fi
            else
              echo "| ${contract} | — | Not found |" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mythril-reports
          path: |
            mythril-reports/
            mythril-combined.md
          retention-days: 90
