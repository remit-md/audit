name: Slither

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Protocol repo ref (branch, tag, or SHA)"
        required: false
        default: "main"
        type: string
  workflow_call:
    inputs:
      ref:
        required: false
        default: "main"
        type: string

permissions:
  contents: read
  security-events: write

jobs:
  slither:
    name: Slither static analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout protocol
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: remit-md/protocol
          ref: ${{ inputs.ref }}
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1

      - name: Build contracts
        run: forge build --build-info

      - name: Install Slither
        run: pip install slither-analyzer==0.11.5

      - name: Run Slither (full report)
        run: |
          slither . \
            --filter-paths "lib/|test/|script/|src/test/" \
            --exclude-dependencies \
            --detect all \
            --json slither-report.json \
            --sarif slither-sarif.json \
            2>&1 | tee slither-output.txt || true

      - name: Generate summary
        if: always()
        run: |
          echo "## Slither Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Count by severity
          if [ -f slither-report.json ]; then
            echo "### Findings by Severity" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            for sev in High Medium Low Informational Optimization; do
              count=$(python3 -c "
          import json, sys
          data = json.load(open('slither-report.json'))
          results = data.get('results', {}).get('detectors', [])
          print(sum(1 for r in results if r.get('impact','').lower() == '${sev,,}'))
          " 2>/dev/null || echo "?")
              echo "- **${sev}:** ${count}" >> $GITHUB_STEP_SUMMARY
            done
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # Contracts analyzed
          echo "### Contracts Analyzed" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          find src -maxdepth 1 -name "*.sol" | sort | while read f; do
            echo "  $(basename $f)"
          done >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Fail on high-severity findings
        if: always()
        run: |
          if [ -f slither-report.json ]; then
            high_count=$(python3 -c "
          import json
          data = json.load(open('slither-report.json'))
          results = data.get('results', {}).get('detectors', [])
          print(sum(1 for r in results if r.get('impact','').lower() == 'high'))
          " 2>/dev/null || echo "0")
            if [ "$high_count" -gt 0 ]; then
              echo "::error::Slither found $high_count high-severity finding(s)"
              exit 1
            fi
          fi

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@480db559a14342288b67e54bd959dd52dc3ee68f # v3
        if: always() && hashFiles('slither-sarif.json') != ''
        with:
          sarif_file: slither-sarif.json

      - name: Upload reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: slither-report
          path: |
            slither-report.json
            slither-sarif.json
            slither-output.txt
          retention-days: 90
