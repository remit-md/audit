name: Aderyn

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Protocol repo ref (branch, tag, or SHA)"
        required: false
        default: "main"
        type: string
  workflow_call:
    inputs:
      ref:
        required: false
        default: "main"
        type: string

permissions:
  contents: read

jobs:
  aderyn:
    name: Aderyn static analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout protocol
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: remit-md/protocol
          ref: ${{ inputs.ref }}
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1
        with:
          version: stable

      - name: Build contracts
        run: forge build

      - name: Install Aderyn (direct binary, pinned v0.6.8)
        env:
          ADERYN_VERSION: "0.6.8"
          ADERYN_TARBALL: "aderyn-x86_64-unknown-linux-gnu.tar.xz"
        run: |
          # Download pre-built binary directly (skip installer script)
          BASE_URL="https://github.com/cyfrin/aderyn/releases/download/aderyn-v${ADERYN_VERSION}"
          curl --proto '=https' --tlsv1.2 -LsSf "${BASE_URL}/${ADERYN_TARBALL}" -o "/tmp/${ADERYN_TARBALL}"
          curl --proto '=https' --tlsv1.2 -LsSf "${BASE_URL}/${ADERYN_TARBALL}.sha256" -o "/tmp/${ADERYN_TARBALL}.sha256"
          # Verify checksum (file must match name in .sha256)
          cd /tmp && sha256sum -c "${ADERYN_TARBALL}.sha256"
          # Extract — tarball contains aderyn binary (may be in a subdir)
          mkdir -p /tmp/aderyn-extract
          tar -xJf "/tmp/${ADERYN_TARBALL}" -C /tmp/aderyn-extract
          # Find the binary and install
          mkdir -p "$HOME/.local/bin"
          BINARY=$(find /tmp/aderyn-extract -name aderyn -type f | head -1)
          if [ -z "$BINARY" ]; then
            echo "ERROR: aderyn binary not found in tarball. Contents:"
            find /tmp/aderyn-extract -type f
            exit 1
          fi
          cp "$BINARY" "$HOME/.local/bin/aderyn"
          chmod +x "$HOME/.local/bin/aderyn"
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          # Verify version
          INSTALLED=$("$HOME/.local/bin/aderyn" --version 2>&1 || true)
          echo "Installed: $INSTALLED"
          if ! echo "$INSTALLED" | grep -q "$ADERYN_VERSION"; then
            echo "ERROR: version mismatch — expected $ADERYN_VERSION, got $INSTALLED"
            exit 1
          fi

      - name: Run Aderyn
        continue-on-error: true
        run: |
          aderyn . \
            --src src/ \
            --path-excludes src/test/ \
            --output aderyn-report.md \
            2>&1 | tee aderyn-output.txt

      - name: Run Aderyn (JSON)
        continue-on-error: true
        run: |
          aderyn . \
            --src src/ \
            --path-excludes src/test/ \
            --output aderyn-report.json

      - name: Generate summary
        if: always()
        run: |
          echo "## Aderyn Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f aderyn-report.md ]; then
            head -80 aderyn-report.md >> $GITHUB_STEP_SUMMARY
          else
            echo "No report generated. See artifact for output." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Contracts Analyzed" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          find src -maxdepth 1 -name "*.sol" | sort | while read f; do
            echo "  $(basename $f)"
          done >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload reports
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: aderyn-report
          path: |
            aderyn-report.md
            aderyn-report.json
            aderyn-output.txt
          retention-days: 90
