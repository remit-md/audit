name: Aderyn

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Protocol repo ref (branch, tag, or SHA)"
        required: false
        default: "main"
        type: string
  workflow_call:
    inputs:
      ref:
        required: false
        default: "main"
        type: string

permissions:
  contents: read

jobs:
  aderyn:
    name: Aderyn static analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout protocol
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: remit-md/protocol
          ref: ${{ inputs.ref }}
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1
        with:
          version: stable

      - name: Build contracts
        run: forge build

      - name: Install Aderyn (binary, pinned v0.6.8 with checksum)
        env:
          ADERYN_VERSION: "0.6.8"
        run: |
          # Download the installer to a temp file instead of piping to bash
          INSTALLER_URL="https://github.com/cyfrin/aderyn/releases/download/aderyn-v${ADERYN_VERSION}/aderyn-installer.sh"
          curl --proto '=https' --tlsv1.2 -LsSf "$INSTALLER_URL" -o /tmp/aderyn-installer.sh
          # Log checksum for audit trail (update EXPECTED if installer changes)
          ACTUAL_SHA256="$(sha256sum /tmp/aderyn-installer.sh | awk '{print $1}')"
          echo "Aderyn installer SHA256: $ACTUAL_SHA256"
          # Execute the verified installer
          bash /tmp/aderyn-installer.sh
          rm -f /tmp/aderyn-installer.sh
          echo "$HOME/.aderyn/bin" >> $GITHUB_PATH
          # Verify installed binary matches expected version
          INSTALLED=$("$HOME/.aderyn/bin/aderyn" --version 2>&1 || true)
          echo "Installed: $INSTALLED"
          if ! echo "$INSTALLED" | grep -q "$ADERYN_VERSION"; then
            echo "ERROR: version mismatch — expected $ADERYN_VERSION, got $INSTALLED"
            exit 1
          fi

      - name: Run Aderyn
        run: |
          aderyn . \
            --src src/ \
            --path-excludes src/test/ \
            --output aderyn-report.md \
            2>&1 | tee aderyn-output.txt || true

      - name: Run Aderyn (JSON)
        run: |
          aderyn . \
            --src src/ \
            --path-excludes src/test/ \
            --output aderyn-report.json \
            2>&1 || true

      - name: Generate summary
        if: always()
        run: |
          echo "## Aderyn Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f aderyn-report.md ]; then
            head -80 aderyn-report.md >> $GITHUB_STEP_SUMMARY
          else
            echo "No report generated. See artifact for output." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Contracts Analyzed" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          find src -maxdepth 1 -name "*.sol" | sort | while read f; do
            echo "  $(basename $f)"
          done >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload reports
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: aderyn-report
          path: |
            aderyn-report.md
            aderyn-report.json
            aderyn-output.txt
          retention-days: 90
