name: Full Audit Suite

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Protocol repo ref (branch, tag, or SHA)"
        required: false
        default: "main"
        type: string

# Runs all 4 audit tools in parallel against the same ref.
# Use this for pre-deployment security sweeps.

permissions:
  contents: read

jobs:
  slither:
    name: Slither
    uses: ./.github/workflows/slither.yml
    with:
      ref: ${{ inputs.ref }}

  aderyn:
    name: Aderyn
    uses: ./.github/workflows/aderyn.yml
    with:
      ref: ${{ inputs.ref }}

  mythril:
    name: Mythril
    uses: ./.github/workflows/mythril.yml
    with:
      ref: ${{ inputs.ref }}

  halmos:
    name: Halmos
    uses: ./.github/workflows/halmos.yml
    with:
      ref: ${{ inputs.ref }}

  summary:
    name: Audit Summary
    runs-on: ubuntu-latest
    needs: [slither, aderyn, mythril, halmos]
    if: always()
    steps:
      - name: Generate combined summary
        run: |
          echo "## Full Audit Suite — Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tool | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Slither | ${{ needs.slither.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Aderyn | ${{ needs.aderyn.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mythril | ${{ needs.mythril.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Halmos | ${{ needs.halmos.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Ref: \`${{ inputs.ref }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See individual job artifacts for detailed reports." >> $GITHUB_STEP_SUMMARY
